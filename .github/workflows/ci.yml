# ──────────────────────────────────────────────────────────────────────────────
# CI / CD – Build, test, and publish bbmodel2bam on push to main/master or
# tagged releases.
# ──────────────────────────────────────────────────────────────────────────────
name: Continuous Integration

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
    branches: [master, main]

permissions:
  contents: write
  id-token: write

concurrency:
  group: build-app-${{ github.ref }}
  cancel-in-progress: true

# ══════════════════════════════════════════════════════════════════════════════
jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Build wheels – one job per (platform × Python version)
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: "Build / ${{ matrix.os }} / py${{ matrix.python-version }}"
    if: >-
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.head_commit.message, '[ci skip]')

    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest
        python-version:
          - "3.8"
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build tools
        run: pip install build "setuptools>=64" wheel

      - name: Determine build version
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0.dev${{ github.run_number }}"
          fi
          echo "Resolved package version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build wheel
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ steps.version.outputs.version }}
        run: python -m build --wheel

      - name: Build sdist
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
        run: python -m build --sdist

      - name: Install package
        shell: bash
        run: pip install dist/*.whl

      - name: Smoke test - CLI help
        run: bbmodel2bam --help

      - name: Smoke test - version
        run: bbmodel2bam --version

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v6
        with:
          name: wheel-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/*.whl
          if-no-files-found: error

      - name: Upload sdist artifact
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
        uses: actions/upload-artifact@v6
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  # ────────────────────────────────────────────────────────────────────────────
  # Publish to PyPI (tagged releases only)
  # ────────────────────────────────────────────────────────────────────────────
  publish:
    name: Deploy / PyPI
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      id-token: write

    environment:
      name: pypi
      url: https://pypi.org/p/panda3d-bbmodel2bam

    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v6
        with:
          path: dist
          pattern: wheel-*
          merge-multiple: true

      - name: Download sdist artifact
        uses: actions/download-artifact@v6
        with:
          path: dist
          name: sdist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # ────────────────────────────────────────────────────────────────────────────
  # GitHub Release (tagged releases only)
  # ────────────────────────────────────────────────────────────────────────────
  github-release:
    name: Deploy / GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v6
        with:
          path: dist
          pattern: wheel-*
          merge-multiple: true

      - name: Download sdist artifact
        uses: actions/download-artifact@v6
        with:
          path: dist
          name: sdist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
